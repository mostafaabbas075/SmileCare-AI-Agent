# =============================================================================
# Alembic Configuration
# =============================================================================
# This file is consumed by the `alembic` CLI.
# The DATABASE_URL is read dynamically in alembic/env.py from the app settings,
# so the sqlalchemy.url placeholder below is intentionally overridden at runtime.
# =============================================================================

[alembic]
# Path to migration scripts, relative to this file
script_location = alembic

# Template used when creating new migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for revision filenames
timezone = UTC

# Max length for the "slug" portion of the filename
truncate_slug_length = 40

# Placeholder — overridden in env.py by app settings
sqlalchemy.url = postgresql+asyncpg://postgres:password@localhost:5432/dental_db

# If true, transaction is managed by the migration script rather than Alembic
transaction_per_migration = false

[post_write_hooks]
# Run ruff formatter on generated migration files
# hooks = ruff_format
ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

# =============================================================================
# Logging
# =============================================================================
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
